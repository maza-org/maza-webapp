name: Frequent API Check
on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 30 seconds
  workflow_dispatch:          # Allows manual triggering
jobs:
  check-api:
    runs-on: ubuntu-latest
    
    steps:
    - name: Make API Request
      run: |
        curl --location 'https://api.mazas.org/api/subjects?fields=name&sort=name&locale=pt' \
        --fail \
        --retry 3 \
        --retry-delay 5
        
    - name: Notify on Failure
      if: failure()
      run: |
        echo "API request failed after retries"
        exit 1
