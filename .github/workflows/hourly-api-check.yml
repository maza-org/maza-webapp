name: Half-Hourly API Check
on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 minutes
  workflow_dispatch:      # Allows manual triggering

jobs:
  check-api:
    runs-on: ubuntu-latest
    
    steps:
    - name: Make API Request
      run: |
        curl --location 'https://maza-strapi-backend.onrender.com/api/subjects?fields=name&sort=name&locale=pt' \
        --fail \
        --retry 3 \
        --retry-delay 5
        
    - name: Notify on Failure
      if: failure()
      run: |
        echo "API request failed after retries"
        exit 1